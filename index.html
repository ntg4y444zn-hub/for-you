<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will You Be Mine?</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffebee;
            font-family: 'Arial', sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 320px;
            z-index: 5;
        }
        h2 {
            color: #d81b60;
            font-size: 24px;
            margin-bottom: 35px;
            font-weight: bold;
        }
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; 
            width: 100%;
            position: relative;
        }
        .btn-yes {
            background-color: #e91e63;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(233, 30, 99, 0.3);
            flex: 1;
        }
        .btn-no {
            background-color: #f5f5f5;
            color: #333;
            border: 1px solid #e0e0e0;
            padding: 12px 35px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            flex: 1;
            transition: left 0.1s ease, top 0.1s ease; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>🌸 Will you be mine? 🌸</h2>
        <div class="button-container">
            <button class="btn-yes" onclick="celebrate()">YES ♥</button>
            <button class="btn-no" id="noBtn">NO 🥺</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        function moveButton(e) {
            if(e) e.preventDefault(); 
            if (noBtn.style.position !== 'fixed') {
                noBtn.style.position = 'fixed';
            }
            const padding = 30; 
            const maxW = window.innerWidth - noBtn.offsetWidth - padding;
            const maxH = window.innerHeight - noBtn.offsetHeight - padding;

            let x = Math.max(padding, Math.random() * maxW);
            let y = Math.max(padding, Math.random() * maxH);
            
            const card = document.querySelector('.card').getBoundingClientRect();
            
            if (x > card.left - 20 && x < card.right + 20 && y > card.top - 20 && y < card.bottom + 20) {
                x = padding; 
                y = padding; 
            }

            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        function celebrate() {
            alert('Yayyy! I knew it! ❤️ 🌸');
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton, { passive: false });
        noBtn.addEventListener('click', moveButton);
    </script>

</body>
</html>
</body>
</html>
